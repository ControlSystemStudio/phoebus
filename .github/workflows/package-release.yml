name: Final Distribution Packaging

on:
  workflow_run:
    workflows: ["Phoebus build", "Launcher Build"]
    types:
      - completed

jobs:
  bundle:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            launcher_name: launcher-windows-latest
          - os: ubuntu-latest
            launcher_name: launcher-ubuntu-latest
          - os: macos-latest
            launcher_name: launcher-macos-latest

    steps:
      - name: Download Phoebus Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Phoebus product ${{ matrix.os }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Launcher Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.launcher_name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Unified Bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          Expand-Archive -Path *.zip -DestinationPath dist/
          Move-Item -Path phoebus-launcher.exe -Destination dist/
          Compress-Archive -Path dist/* -DestinationPath Phoebus-Full-Windows.zip

      - name: Create Unified Bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir dist
          tar -xzf *.tar.gz -C dist/
          mv phoebus-launcher-linux dist/phoebus-launcher
          chmod +x dist/phoebus-launcher
          tar -czf Phoebus-Full-Linux.tar.gz -C dist/ .

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p "Phoebus Launcher.app/Contents/MacOS"
          mkdir -p "Phoebus Launcher.app/Contents/Resources"

          # Move the Rust launcher into the App structure
          mv phoebus-launcher-mac "Phoebus Launcher.app/Contents/MacOS/phoebus-launcher"
          chmod +x "Phoebus Launcher.app/Contents/MacOS/phoebus-launcher"

          # Create the Info.plist that registers the URI
          cat <<EOF > "Phoebus Launcher.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>phoebus-launcher</string>
              <key>CFBundleIdentifier</key>
              <string>org.phoebus.launcher</string>
              <key>CFBundleURLTypes</key>
              <array>
                  <dict>
                      <key>CFBundleURLName</key>
                      <string>Phoebus Protocol</string>
                      <key>CFBundleURLSchemes</key>
                      <array>
                          <string>phoebus</string>
                      </array>
                  </dict>
              </array>
          </dict>
          </plist>
          EOF

          zip -r Phoebus-Full-Mac.zip "Phoebus Launcher.app"

      - name: Upload Final Release
        uses: actions/upload-artifact@v4
        with:
          name: Full-Distribution-${{ matrix.os }}
          path: Phoebus-Full-*
